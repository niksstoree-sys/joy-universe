[build]
builder = "NIXPACKS"

[deploy]
startCommand = "python -m bot.main"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10

# CATATAN PENTING:
# Tambahkan Railway Volume dan mount ke /app/data, lalu set
# DATABASE_URL=/app/data/joyuniverse.db di Railway Variables.
# Ini memastikan database TIDAK reset setiap kali redeploy,
# karena filesystem Railway di luar volume bersifat ephemeral.
